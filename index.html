<html>

        <div id="Output">

        <script>
            var STAFFuser = "JulieBrown"
            var STAFFpass = "JBSoup123"
            var Submitter = "Y" || "y"
            function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
            }  
            async function SubmitTrigger() {
                if (document.getElementById("UserInput").value === "JulieBrown" && document.getElementById("PassInput").value === "JBSoup123" && document.getElementById("Submit").value == "Y") {
                    await sleep(3000)
                    const Success1Para = document.createElement("p");
                    const Success1Text = document.createTextNode("Login Successful, Redirecting...");
                    Success1Para.appendChild(Success1Text);

                    document.getElementById("Output").appendChild(fail1Para);
